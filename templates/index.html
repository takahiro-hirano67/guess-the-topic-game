<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お題当てゲーム</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>お題当てゲーム</h1>
            <div class="controls">
                <button id="reveal-btn" class="secondary-btn">答えを見る</button>
                <button id="reset-btn" class="danger-btn">リセット</button>
            </div>
        </header>

        <div id="chat-window" class="chat-window">
            <!-- メッセージがここに追加されます -->
            <div class="message ai">
                <div class="bubble">こんにちは！私が心の中で決めた「お題」を当ててください。質問をどうぞ！</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="例：それは食べ物ですか？" autocomplete="off">
            <button id="send-btn">送信</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const revealBtn = document.getElementById('reveal-btn');
        const resetBtn = document.getElementById('reset-btn');

        function addMessage(text, role) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();

                if (data.reply) {
                    addMessage(data.reply, 'ai');
                } else if (data.error) {
                    addMessage(`エラー: ${data.error}`, 'ai');
                }
            } catch (e) {
                addMessage('通信エラーが発生しました。', 'ai');
            }
        }

        async function revealTopic() {
            try {
                const response = await fetch('/reveal', { method: 'POST' });
                const data = await response.json();
                if (data.topic) {
                    addMessage(`今回の正解は「${data.topic}」でした！`, 'ai highlight');
                } else if (data.error) {
                    alert(data.error);
                }
            } catch (e) {
                alert('通信エラーが発生しました。');
            }
        }

        async function resetGame() {
            if (confirm('ゲームをリセットして最初から始めますか？')) {
                await fetch('/reset', { method: 'POST' });
                window.location.reload();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        revealBtn.addEventListener('click', revealTopic);
        resetBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
